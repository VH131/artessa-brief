<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Повний Бриф: Artessa Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    input[type="text"],
    input[type="tel"],
    input[type="url"],
    input[type="email"],
    textarea,
    select {
      border-bottom: 2px solid #e2e8f0;
      padding: 0.75rem 0;
      width: 100%;
      transition: border-color 0.3s;
      outline: none;
      background: transparent;
    }

    input:focus,
    textarea:focus,
    select:focus {
      border-color: #000;
    }

    .section-card {
      background: white;
      padding: 2rem;
      border-radius: 1.5rem;
      border: 1px solid #f1f5f9;
      margin-bottom: 2rem;
    }
  </style>
</head>

<body class="bg-[#fcfcfc] text-slate-900 py-12 px-4">
  <div class="max-w-3xl mx-auto">

    <header class="text-center mb-12">
      <h1 class="text-3xl font-black uppercase tracking-tighter mb-2">Artessa Home | Web Strategy</h1>
      <p class="text-slate-500 text-sm">Максимальний опитувальник для розробки сайту та SEO-просування</p>
    </header>

    <form action="https://formspree.io/f/mlgobwjr" method="POST">

      <div class="section-card shadow-sm">
        <h2 class="text-lg font-bold mb-6 flex items-center"><span class="mr-2">🎯</span> Бізнес і позиціонування</h2>
        <div class="space-y-6">
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Хто ваш основний клієнт?</label>
            <select name="target_audience" required>
              <option value="" disabled selected>Виберіть варіант</option>
              <option value="private">Приватні особи (власники квартир/будинків)</option>
              <option value="designers">Дизайнери інтер'єрів та архітектори</option>
              <option value="developers">Забудовники (Deweloperzy)</option>
              <option value="all">Всі перераховані</option>
            </select>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Середній чек проекту (zł)</label>
              <input type="text" name="average_bill" placeholder="Напр: 5,000 - 15,000 zł">
            </div>
            <div>
              <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Кількість реалізованих
                проектів</label>
              <input type="text" name="projects_count" placeholder="Напр: понад 100">
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Що вас відрізняє від конкурентів у
              Млаві?</label>
            <textarea name="competitive_advantage" rows="2"
              placeholder="Ціна, якість матеріалів, унікальні техніки скульптури..."></textarea>
          </div>
        </div>
      </div>

      <div class="section-card shadow-sm">
        <h2 class="text-lg font-bold mb-6 flex items-center"><span class="mr-2">📸</span> Контент та матеріали</h2>
        <div class="space-y-6">
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Наявність візуалу (фото/відео)</label>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2 mt-2">
              <label class="flex items-center text-sm"><input type="checkbox" name="has_full_interiors" class="mr-2">
                Фото готових інтер'єрів (цілком)</label>
              <label class="flex items-center text-sm"><input type="checkbox" name="has_video_process" class="mr-2">
                Відео процесу роботи</label>
            </div>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Посилання на фото
              (Drive/iCloud)</label>
            <input type="url" name="portfolio_link" required placeholder="https://drive.google.com/...">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Чи є клієнт для відео-відгуку або
              тексту?</label>
            <input type="text" name="reviews_availability" placeholder="Так, маю 2-3 людини / Поки немає">
          </div>
        </div>
      </div>

      <div class="section-card shadow-sm">
        <h2 class="text-lg font-bold mb-6 flex items-center"><span class="mr-2">🌐</span> Технічна частина</h2>
        <div class="space-y-6">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Актуальний E-mail</label>
              <input type="email" name="current_email" required placeholder="artessahome3@gmail.com">
            </div>
            <div>
              <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Домен (якщо куплений)</label>
              <input type="text" name="domain_status" placeholder="Назва або 'Треба купити'">
            </div>
          </div>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Географія (міста)</label>
              <input type="text" name="geo_location" required placeholder="Mława + Mazowsze">
            </div>
            <div>
              <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Шоурум (Stary Rynek 12a)</label>
              <select name="showroom_status">
                <option value="everyday">Відкритий щодня</option>
                <option value="appointment">Тільки за записом</option>
                <option value="closed">Тільки як точка видачі</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div class="section-card shadow-sm">
        <h2 class="text-lg font-bold mb-6 flex items-center"><span class="mr-2">💰</span> Терміни та підтримка</h2>
        <div class="space-y-6">
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Коли потрібен готовий сайт?
              (Дедлайн)</label>
            <input type="text" name="deadline" required placeholder="Напр: до кінця квітня">
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Хто буде оновлювати сайт далі?</label>
            <select name="maintenance">
              <option value="client">Я сам (клієнт)</option>
              <option value="dev">Потрібна підтримка розробника</option>
              <option value="not_sure">Ще не знаю</option>
            </select>
          </div>
          <div>
            <label class="block text-xs font-bold uppercase text-slate-400 mb-1">Бюджет на хостинг/домен
              (~$50/рік)</label>
            <select name="hosting_budget">
              <option value="ok">Так, це прийнятно</option>
              <option value="discuss">Потрібно обговорити варіанти</option>
            </select>
          </div>
        </div>
      </div>

      <button type="submit"
        class="w-full bg-slate-900 text-white font-bold py-5 rounded-2xl hover:bg-black transition-all shadow-xl uppercase tracking-widest text-sm">
        Надіслати фінальний бриф
      </button>

    </form>

    <footer class="mt-8 text-center text-[10px] text-slate-400 uppercase tracking-widest">
      Artessa Home Project — Developer: Volodymyr Husar
    </footer>
  </div>
</body>

</html>
