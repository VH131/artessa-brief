<!DOCTYPE html>
<html lang="uk">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Анкета: Artessa Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
  </style>
</head>

<body class="bg-gray-50 text-gray-900 py-12 px-4">
  <div class="max-w-2xl mx-auto bg-white p-8 md:p-12 rounded-3xl shadow-sm border border-gray-100">

    <div class="flex items-center mb-10">
      <div class="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center mr-4">
        <span class="text-2xl">✨</span>
      </div>
      <div>
        <h1 class="text-2xl font-extrabold tracking-tight">Артесса Дім</h1>
        <p class="text-gray-500 text-sm italic">Анкета з дизайну веб-сайту</p>
      </div>
    </div>

    <form action="https://formspree.io/f/mlgobwjr" method="POST" class="space-y-8">

      <div class="space-y-4">
        <h2 class="text-xs uppercase tracking-widest font-bold text-gray-400">Контакти та Техніка</h2>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Точна назва для сайту</label>
          <input type="text" name="company_name" required placeholder="Напр: Artessa Home Mława"
            class="w-full border-b-2 border-gray-200 py-2 outline-none focus:border-yellow-500 transition-colors">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Домен (адреса сайту)</label>
          <input type="text" name="domain" placeholder="Напр: artessahome.pl або бажана назва"
            class="w-full border-b-2 border-gray-200 py-2 outline-none focus:border-yellow-500 transition-colors">
        </div>
      </div>

      <div class="space-y-4">
        <h2 class="text-xs uppercase tracking-widest font-bold text-gray-400">Послуги та SEO</h2>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Перелік послуг (через кому)</label>
          <textarea name="services" rows="3" required placeholder="Мікроцемент, венеціанка, фарбування..."
            class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-yellow-500 transition-colors bg-gray-50"></textarea>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Географія роботи (міста)</label>
          <input type="text" name="location" placeholder="Млава + 50км, Варшава..."
            class="w-full border-b-2 border-gray-200 py-2 outline-none focus:border-yellow-500 transition-colors">
        </div>
      </div>

      <div class="space-y-4">
        <h2 class="text-xs uppercase tracking-widest font-bold text-gray-400">Контент та Фото</h2>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Посилання на фото (Google Drive / iCloud)</label>
          <input type="url" name="photos_url" placeholder="https://drive.google.com/..."
            class="w-full border-b-2 border-gray-200 py-2 outline-none focus:border-yellow-500 transition-colors">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Ваші переваги (чому ви?)</label>
          <textarea name="advantages" rows="2" placeholder="10 років досвіду, італійські матеріали..."
            class="w-full border-2 border-gray-100 rounded-xl p-3 outline-none focus:border-yellow-500 transition-colors bg-gray-50"></textarea>
        </div>
      </div>

      <div class="space-y-4">
        <h2 class="text-xs uppercase tracking-widest font-bold text-gray-400">Очікування</h2>

        <div class="space-y-2">
          <p class="text-sm font-medium text-gray-700">Коли ви хочете, щоб вебсайт був готовий?</p>
          <label class="flex items-center space-x-3 text-sm">
            <input type="radio" name="deadline" value="1-2 weeks" class="text-yellow-500 focus:ring-yellow-500">
            <span>Якомога швидше (1-2 тижні)</span>
          </label>
          <label class="flex items-center space-x-3 text-sm">
            <input type="radio" name="deadline" value="1 month" class="text-yellow-500 focus:ring-yellow-500">
            <span>Протягом місяця</span>
          </label>
        </div>
      </div>

      <div class="pt-6">
        <button type="submit"
          class="w-full bg-black text-white font-bold py-4 rounded-full hover:bg-gray-800 transition-all active:scale-95 shadow-lg">
          Надіслати анкету розробнику
        </button>
        <p class="text-center text-[10px] text-gray-400 mt-4 uppercase tracking-tighter">
          Powered by Formspree API
        </p>
      </div>

    </form>
  </div>
</body>

</html>
